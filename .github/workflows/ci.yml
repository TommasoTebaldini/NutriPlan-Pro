name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Syntax-check all tracked JS files
        run: |
          fail=0
          while IFS= read -r f; do
            node --check "$f" || fail=1
          done < <(git ls-files '*.js' | grep -v '^node_modules/')
          exit $fail

      - name: Check SQL migration for merged/orphaned statements
        run: node scripts/check-sql-syntax.js supabase_setup.sql

      - name: Check minified JS build output is up to date
        run: |
          npm run build:minify
          git diff --exit-code js/db.min.js js/lang.min.js js/utils.min.js js/studies-data.min.js js/linee-guida-data.min.js js/consigli-data.min.js js/ricette-db.min.js

      - name: Smoke-test the Express server
        run: |
          node server.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/ -o /dev/null; then break; fi
            sleep 0.5
          done
          curl -sf http://localhost:5000/ -o /dev/null
          kill $SERVER_PID
