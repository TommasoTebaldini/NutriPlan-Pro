<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documento NutriPlan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1a1a1a; min-height: 100vh; }
  .doc-wrap { max-width: 800px; margin: 0 auto; padding: 24px 20px 60px; }
  .doc-header { background: linear-gradient(135deg, #0d5c3a, #1a7f5a); color: white; border-radius: 16px; padding: 24px; margin-bottom: 28px; }
  .doc-header .category { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.75; margin-bottom: 8px; }
  .doc-header .title { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .doc-header .subtitle { font-size: 13px; opacity: 0.8; margin-top: 6px; }
  .section { background: white; border: 1px solid #e5e7eb; border-radius: 14px; overflow: hidden; margin-bottom: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .section-head { background: #1a7f5a; color: white; padding: 10px 18px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 8px 16px; font-size: 11px; color: #666; text-align: left; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
  td { padding: 9px 16px; font-size: 13px; border-bottom: 1px solid #f3f4f6; }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: #fafafa; }
  .key-col { color: #555; font-weight: 600; width: 45%; }
  /* Score box */
  .score-box { background: white; border-radius: 14px; padding: 28px; text-align: center; margin-bottom: 18px; border: 2px solid #e5e7eb; }
  .score-num { font-size: 56px; font-weight: 900; line-height: 1; }
  .score-label { font-size: 16px; font-weight: 700; margin-top: 6px; }
  .score-desc { margin-top: 16px; font-size: 14px; line-height: 1.8; color: #444; text-align: left; background: #f9fafb; border-radius: 10px; padding: 14px; }
  /* Meal plan */
  .day-block { margin-bottom: 24px; }
  .day-head { background: #1a7f5a; color: white; padding: 10px 16px; border-radius: 10px; margin-bottom: 10px; font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .meal-block { border: 1px solid #e8f2ec; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
  .meal-head { background: #f0faf5; padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8f2ec; }
  .meal-name { font-weight: 600; font-size: 14px; color: #0d5c3a; display: flex; align-items: center; gap: 8px; }
  .meal-kcal { font-size: 12px; color: #666; background: white; padding: 2px 8px; border-radius: 100px; border: 1px solid #e8f2ec; }
  .food-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .food-table td { padding: 6px 14px; border-bottom: 1px solid #f5f5f5; }
  .food-table tr:last-child td { border-bottom: none; }
  .food-qty { text-align: right; color: #1a7f5a; font-weight: 500; }
  .alt-row td { font-size: 11px; color: #999; font-style: italic; padding: 4px 14px 8px; }
  .note-box { padding: 10px 14px; background: #fffbeb; border-left: 3px solid #f59e0b; font-size: 13px; color: #92400e; margin: 8px 14px; border-radius: 0 6px 6px 0; }
  /* Alert boxes */
  .info-box { border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; font-size: 14px; line-height: 1.7; }
  .info-box.green { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
  .info-box.red   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
  .info-box.blue  { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
  .info-box.amber { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
  /* Consiglio lists */
  .list-section { margin-bottom: 16px; }
  .list-head { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; }
  .list-head.green  { background: #f0fdf4; color: #16a34a; }
  .list-head.yellow { background: #fffbeb; color: #d97706; }
  .list-head.red    { background: #fef2f2; color: #dc2626; }
  ul.items { padding-left: 22px; font-size: 14px; line-height: 2; }
  /* Footer */
  .doc-footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e5e7eb; font-size: 11px; color: #aaa; text-align: center; }
  /* Error */
  .error { text-align: center; padding: 60px 20px; color: #666; }
  .error h2 { font-size: 20px; margin-bottom: 8px; }
  /* Print */
  @media print {
    body { background: white; }
    .doc-wrap { padding: 0; max-width: 100%; }
    .doc-header { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .section-head { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .day-head { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="doc-wrap" id="app">
  <div class="error"><h2>⏳ Caricamento documento...</h2></div>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────────
function deepParse(v, max=4) {
  for (let i=0; i<max; i++) {
    if (typeof v !== 'string') break
    try { v = JSON.parse(v) } catch { break }
  }
  if (!v || typeof v !== 'object') return null
  // Also parse string sub-values that look like JSON
  const r = {}
  for (const [k,val] of Object.entries(v)) {
    if (typeof val==='string' && (val.startsWith('[') || val.startsWith('{'))) {
      try { r[k] = JSON.parse(val) } catch { r[k] = val }
    } else { r[k] = val }
  }
  return r
}
function parseArr(v) {
  if (Array.isArray(v)) return v
  if (typeof v==='string') { try { const p=JSON.parse(v); return Array.isArray(p)?p:[] } catch{} }
  return []
}
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag)
  for (const [k,v] of Object.entries(attrs)) {
    if (k==='class') e.className=v
    else if (k==='style') e.style.cssText=v
    else e.setAttribute(k,v)
  }
  for (const c of children) {
    if (c==null||c===false) continue
    e.appendChild(typeof c==='string' ? document.createTextNode(c) : c)
  }
  return e
}
function secTable(title, rows, icon='') {
  const validRows = rows.filter(([,v]) => v!==''&&v!==null&&v!==undefined&&!Array.isArray(v)&&typeof v!=='object')
  if (!validRows.length) return null
  const thead = el('thead',{},el('tr',{},...[['Campo','Valore']].map(
    ([h]) => el('th',{},h)
  )))
  const tbody = el('tbody',{},...validRows.map(([k,v]) =>
    el('tr',{},el('td',{class:'key-col'},k),el('td',{},String(v)))
  ))
  return el('div',{class:'section'},
    el('div',{class:'section-head'},`${icon} ${title}`),
    el('table',{},thead,tbody)
  )
}

// ── Renderers ──────────────────────────────────────────────────────────────────
const MEAL_LABELS = {
  colazione:{label:'Colazione',emoji:'☀️'},
  spuntino1:{label:'Spuntino mattina',emoji:'🍎'},spuntino_mattina:{label:'Spuntino mattina',emoji:'🍎'},
  pranzo:{label:'Pranzo',emoji:'🍽️'},
  spuntino2:{label:'Spuntino pomeriggio',emoji:'🥤'},spuntino_pomeriggio:{label:'Spuntino pomeriggio',emoji:'🥤'},
  cena:{label:'Cena',emoji:'🌙'},
}
const CALC_LABELS = {
  peso:'Peso (kg)',altezza:'Altezza (cm)',eta:'Età',sesso:'Sesso',
  peso_ideale:'Peso ideale (kg)',imc:'IMC',bmi:'BMI',
  fabbisogno:'Fabbisogno kcal',kcal:'Kcal/die',
  proteine:'Proteine (g)',carboidrati:'Carboidrati (g)',grassi:'Grassi (g)',
  tipo:'Tipo',tdd:'TDD (UI)',metodo:'Metodo',
  attivita:'Attività fisica',npasti:'N° pasti',luogo:'Luogo pasti',
  appetito:'Appetito',allergie:'Allergie',
}

function renderPiano(dati, meta) {
  const days = parseArr(dati.meals || dati.giorni)
  const frag = document.createDocumentFragment()
  if (!days.length) {
    frag.appendChild(el('div',{class:'info-box blue'},'Nessun dettaglio pasti disponibile.'))
    return frag
  }
  for (const day of days) {
    const meals = parseArr(day.meals)
    const dayEl = el('div',{class:'day-block'},
      el('div',{class:'day-head'},'📅 ',day.nome||`Giorno`)
    )
    for (const meal of meals) {
      const mKey = meal.id||meal.tipo||''
      const m = MEAL_LABELS[mKey]||{label:meal.nome||mKey||'Pasto',emoji:'🍴'}
      const items = parseArr(meal.items||meal.foods||meal.alimenti||[])
      const kcal = meal.kcal||meal.calorie||null
      const note = meal.note||meal.notes||''
      const mealEl = el('div',{class:'meal-block'},
        el('div',{class:'meal-head'},
          el('span',{class:'meal-name'},meal.emoji||m.emoji,' ',meal.nome||m.label),
          kcal?el('span',{class:'meal-kcal'},'🔥 ',kcal,' kcal'):null
        )
      )
      if (items.length) {
        const tbody = el('tbody',{},...items.map((food,fi) => {
          const rows = [el('tr',{},
            el('td',{},food.nome||food.name||food.alimento||''),
            el('td',{class:'food-qty'},(food.qt||food.quantita||food.quantity||'')+(food.misura||food.unita||food.unit||'g'))
          )]
          if (food.altPrint?.length) {
            rows.push(el('tr',{class:'alt-row'},
              el('td',{colspan:'2'},'Alt: '+food.altPrint.map(a=>`${a.nome} ${a.qt||''}g`).join(' / '))
            ))
          }
          return rows
        }).flat())
        mealEl.appendChild(el('table',{class:'food-table'},tbody))
      }
      if (note) mealEl.appendChild(el('div',{class:'note-box'},'💡 '+note))
      dayEl.appendChild(mealEl)
    }
    frag.appendChild(dayEl)
  }
  return frag
}

function renderRistorazione(dati) {
  const val = deepParse(dati.valutazione)||{}
  const piano = deepParse(dati.piano)||{}
  const portate = parseArr(piano.portate||val.portate||[])
  const frag = document.createDocumentFragment()
  const infoRows = [
    ['Tipo utenza', piano.tipo||val.tipo],
    ['Utenza', piano.utenza||val.utenza],
    ['Coperti', piano.coperti||val.coperti],
    ['Kcal', piano.kcal||val.kcal],
    ['Diete speciali', piano.diete||val.diete],
    ['Allergeni', piano.allergeni||val.allergeni],
    ['Note struttura', piano.note_struttura||val.note_struttura],
  ]
  const infoTable = secTable('Struttura', infoRows, '📋')
  if (infoTable) frag.appendChild(infoTable)
  if (portate.length) {
    const tbody = el('tbody',{},...portate.map((p,i) =>
      el('tr',{},
        el('td',{style:'font-weight:600;color:#1a7f5a'},p.nome||''),
        el('td',{},p.porzione||''),
        el('td',{style:'font-size:12px;color:#666'},p.note||'—')
      )
    ))
    frag.appendChild(el('div',{class:'section'},
      el('div',{class:'section-head'},'🍽️ Portate'),
      el('table',{},
        el('thead',{},el('tr',{},...['Portata','Porzione','Note'].map(h=>el('th',{},h)))),
        tbody
      )
    ))
  }
  const noteGen = piano.note_generali||val.note_generali
  if (noteGen) frag.appendChild(el('div',{class:'note-box',style:'margin:0 0 16px'},'💡 '+noteGen))
  return frag
}

function renderPediatria(dati) {
  const paz = deepParse(dati.paziente)||{}
  const pianoRaw = deepParse(dati.piano)||{}
  const pastiRaw = dati.pasti||pianoRaw.pasti||[]
  const pasti = parseArr(pastiRaw)
  const piano = Object.fromEntries(Object.entries(pianoRaw).filter(([k])=>k!=='pasti'))
  const frag = document.createDocumentFragment()
  const pazTable = secTable('Dati paziente', Object.entries(paz), '👶')
  if (pazTable) frag.appendChild(pazTable)
  const pianoTable = secTable('Piano', Object.entries(piano), '📋')
  if (pianoTable) frag.appendChild(pianoTable)
  if (pasti.length) {
    const tbody = el('tbody',{},...pasti.map((p,i)=>
      el('tr',{},
        el('td',{style:'font-weight:600;color:#1a7f5a'},p.nome||''),
        el('td',{style:'color:#666'},p.ora||''),
        el('td',{},
          Array.isArray(p.items)?p.items.map(it=>`${it.nome||''} ${it.qt||''}${it.misura||'g'}`).join(', '):
          Array.isArray(p.alimenti)?p.alimenti.join(', '):
          p.descrizione||p.alimenti||''
        )
      )
    ))
    frag.appendChild(el('div',{class:'section'},
      el('div',{class:'section-head'},'🍼 Schema pasti'),
      el('table',{},
        el('thead',{},el('tr',{},...['Pasto','Orario','Descrizione'].map(h=>el('th',{},h)))),
        tbody
      )
    ))
  }
  return frag
}

function renderCalcolo(tipo, dati) {
  const calcData = dati.calcolo||dati.rapporto_ic||dati.panoramica||dati
  const frag = document.createDocumentFragment()
  if (!calcData||typeof calcData!=='object') return frag
  const flatRows = Object.entries(calcData)
    .filter(([,v]) => v!==''&&v!==null&&v!==undefined&&typeof v!=='object')
    .map(([k,v]) => [CALC_LABELS[k]||k.replace(/_/g,' '),v])
  const t = secTable('Dati clinici', flatRows, '📊')
  if (t) frag.appendChild(t)
  for (const [k,v] of Object.entries(calcData)) {
    if (!v||typeof v!=='object'||Array.isArray(v)) continue
    const nested = Object.entries(v).filter(([,vv])=>vv!==''&&vv!==null&&vv!==undefined&&typeof vv!=='object')
    const nt = secTable(k.replace(/_/g,' '), nested.map(([kk,vv])=>[CALC_LABELS[kk]||kk.replace(/_/g,' '),vv]))
    if (nt) frag.appendChild(nt)
  }
  return frag
}

function renderConsiglio(dati) {
  const frag = document.createDocumentFragment()
  if (dati.descrizione||dati.indicazioni) {
    frag.appendChild(el('div',{class:'info-box blue'},dati.descrizione||dati.indicazioni))
  }
  if (dati.alimenti_consentiti?.length) {
    frag.appendChild(el('div',{class:'list-section'},
      el('div',{class:'list-head green'},'✅ Alimenti consentiti'),
      el('ul',{class:'items'},...dati.alimenti_consentiti.map(a=>el('li',{},a)))
    ))
  }
  if (dati.alimenti_limitare?.length) {
    frag.appendChild(el('div',{class:'list-section'},
      el('div',{class:'list-head yellow'},'⚠️ Da limitare'),
      el('ul',{class:'items'},...dati.alimenti_limitare.map(a=>el('li',{},a)))
    ))
  }
  if (dati.alimenti_evitare?.length) {
    frag.appendChild(el('div',{class:'list-section'},
      el('div',{class:'list-head red'},'🚫 Da evitare'),
      el('ul',{class:'items'},...dati.alimenti_evitare.map(a=>el('li',{},a)))
    ))
  }
  if (dati.note) frag.appendChild(el('div',{class:'note-box',style:'margin:0 0 16px'},'💡 '+dati.note))
  return frag
}

// ── Main render ────────────────────────────────────────────────────────────────
function render() {
  const params = new URLSearchParams(location.search)
  const tipo = (params.get('tipo')||'').toLowerCase()
  const nota = params.get('nota')||''
  const dataB64 = params.get('data')||''

  if (!dataB64) {
    document.getElementById('app').innerHTML = '<div class="error"><h2>⚠️ Nessun documento</h2><p>Parametri mancanti nell\'URL</p></div>'
    return
  }

  let dati = {}
  try {
    const json = decodeURIComponent(atob(dataB64))
    dati = deepParse(json)||{}
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="error"><h2>⚠️ Errore decodifica</h2><p>'+e.message+'</p></div>'
    return
  }

  // Header meta
  const META = {
    piano:       {icon:'🥗', cat:'Piano Alimentare'},
    ristorazione:{icon:'🍽️', cat:'Menu Ristorazione Collettiva'},
    pediatria:   {icon:'👶', cat:'Schema Nutrizionale Pediatrico'},
    questionario:{icon:'📋', cat:'Questionario Clinico'},
    consiglio:   {icon:'💊', cat:'Consiglio Nutrizionale'},
    chetogenica: {icon:'🥑', cat:'Dieta Chetogenica'},
    renale:      {icon:'🫘', cat:'Nefropatia / IRC'},
    diabete:     {icon:'💉', cat:'Gestione Diabete'},
    dca:         {icon:'🧠', cat:'DCA - Sessione'},
    sport:       {icon:'🏋️', cat:'Nutrizione Sportiva'},
    pancreas:    {icon:'🫀', cat:'Insufficienza Pancreatica'},
    disfagia:    {icon:'🍵', cat:'Disfagia'},
  }
  const m = META[tipo]||{icon:'📄', cat:'Documento Clinico'}

  const wrap = document.getElementById('app')
  wrap.innerHTML = ''

  // Header
  wrap.appendChild(el('div',{class:'doc-header'},
    el('div',{class:'category'},m.icon+' '+m.cat),
    el('div',{class:'title'},nota||m.cat),
    el('div',{class:'subtitle'},new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'}))
  ))

  // Content by tipo
  let content
  if (tipo==='piano'||tipo==='dieta'||dati.meals||dati.giorni) {
    content = renderPiano(dati, m)
  } else if (tipo==='ristorazione'||dati.piano?.portate||dati.valutazione?.portate) {
    content = renderRistorazione(dati)
  } else if (tipo==='pediatria'||(dati.paziente&&(dati.pasti||dati.piano?.pasti))) {
    content = renderPediatria(dati)
  } else if (tipo==='questionario'||dati.questionario!==undefined) {
    const scoreColor = (dati.score||0)>=3?'#dc2626':(dati.score||0)>=1?'#d97706':'#16a34a'
    const sb = el('div',{class:'score-box',style:`border-color:${scoreColor}30`},
      el('div',{class:'score-num',style:`color:${scoreColor}`},dati.score??'—'),
      el('div',{class:'score-label',style:`color:${scoreColor}`},dati.label||''),
      dati.desc?el('div',{class:'score-desc'},dati.desc):null
    )
    const fr = document.createDocumentFragment()
    fr.appendChild(sb)
    content = fr
  } else if (tipo==='consiglio'||dati.consiglio_id||dati.consiglio_nome) {
    const fr = document.createDocumentFragment()
    fr.appendChild(el('div',{class:'info-box red',style:'font-size:18px;font-weight:700;margin-bottom:16px'},
      dati.consiglio_nome||nota
    ))
    fr.appendChild(renderConsiglio(dati))
    content = fr
  } else {
    // Calcolo clinico generico
    content = renderCalcolo(tipo, dati)
  }

  if (content) wrap.appendChild(content)

  // Footer
  wrap.appendChild(el('div',{class:'doc-footer'},
    'Documento generato da NutriPlan Pro • ',
    new Date().toLocaleDateString('it-IT')
  ))
}

render()
</script>
</body>
</html>
