<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Cartelle Pazienti — NutriPlan Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav id="sidebar">
  <div class="logo"><h1>NutriPlan<br>Pro</h1><span>CREA 2019 + BDA</span></div>
  <div class="nav-sec">Piano</div>
  <a class="nav-item" href="app.html"><span class="ni">📋</span>Piano Alimentare</a>
  <a class="nav-item active" href="pazienti.html" id="nav-pazienti"><span class="ni">📁</span>Cartelle Pazienti</a>
  <div class="nav-sec">Strumenti</div>
  <a class="nav-item" href="patologie.html"><span class="ni">🏥</span>Diete per Patologia</a>
  <a class="nav-item" href="valutazione.html"><span class="ni">📊</span>Valutazione Paziente</a>
  <a class="nav-item" href="linee-guida.html"><span class="ni">📚</span>Linee Guida</a>
  <div class="nav-sec">Database</div>
  <a class="nav-item" href="database.html"><span class="ni">🔬</span>Alimenti CREA+BDA</a>
  <a class="nav-item" href="ricette.html"><span class="ni">👨‍🍳</span>Ricette</a>
  <a class="nav-item" href="admin.html" id="nav-admin" style="display:none"><span class="ni">⚙️</span>Admin Utenti</a>
  <div class="sb-bottom">
    <div class="sb-user" id="sb-user-email"></div>
    <button class="sb-logout" onclick="doLogout()">🚪 Esci</button>
  </div>
</nav>
<div id="sb-overlay" onclick="closeSB()"></div>
<div id="topbar">
  <button id="menu-toggle" onclick="toggleSB()">☰</button>
  <h2 id="page-title">📁 Cartelle Pazienti</h2>
  <div class="tbar-actions">
    <button class="btn btn-primary btn-sm" onclick="openNewCartella()">📁 Nuova Cartella</button>
  </div>
</div>
<main id="main">
<div class="page-content" id="main-content">
  <div class="empty-state"><div class="ei">⏳</div><h3>Caricamento...</h3></div>
</div>
</main>

<!-- MODAL: NUOVA CARTELLA -->
<div class="modal-bg" id="modal-nc">
  <div class="modal" style="max-width:400px">
    <div class="mhdr"><h2 id="nc-title">📁 Nuova Cartella Paziente</h2><button class="mclose" onclick="closeM('modal-nc')">✕</button></div>
    <div class="mbody">
      <div class="fgrid">
        <div class="fg"><label>Nome *</label><input type="text" id="nc-nome" placeholder="Nome"></div>
        <div class="fg"><label>Cognome</label><input type="text" id="nc-cognome" placeholder="Cognome"></div>
        <div class="fg"><label>Data di nascita</label><input type="date" id="nc-ddn"></div>
        <div class="fg"><label>Sesso</label><select id="nc-sesso"><option value="">—</option><option value="M">Maschio</option><option value="F">Femmina</option></select></div>
        <div class="fg full"><label>Diagnosi / Note cliniche</label><textarea id="nc-note" placeholder="Diagnosi, allergie, farmaci..."></textarea></div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-ghost btn-sm" onclick="closeM('modal-nc')">Annulla</button>
      <button class="btn btn-primary btn-sm" id="nc-save-btn" onclick="salvaCartella()">📁 Crea Cartella</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="loading-overlay"><div class="spinner"></div></div>

<script src="js/utils.js"></script>
<script>
let cartellaAperta = null;
let editingCartellaId = null;

async function init() {
  await checkAuth();
  loadCartelle();
}

async function loadCartelle() {
  const wrap = document.getElementById('main-content');
  if (cartellaAperta) { await renderCartellaDetail(cartellaAperta); return; }
  wrap.innerHTML = '<div class="empty-state"><div class="ei">⏳</div><h3>Caricamento...</h3></div>';
  const { data, error } = await sb.from('cartelle').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  if (error || !data) { wrap.innerHTML = '<div class="empty-state"><div class="ei">❌</div><h3>Errore</h3></div>'; return; }
  if (!data.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="ei">📁</div><h3>Nessuna cartella</h3><p>Crea la prima cartella paziente con il pulsante in alto a destra.</p></div>`;
    return;
  }
  wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">` +
    data.map(c => {
      const eta = c.ddn ? calcolaEta(c.ddn) : null;
      return `<div class="paz-card" onclick="apriCartella('${c.id}')">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:24px">📁</span>
          <div><h4>${esc(c.nome)}</h4><div class="paz-meta">${eta !== null ? eta + ' anni · ' : ''}${c.sesso || ''}</div></div>
        </div>
        ${c.note ? '<div style="font-size:11px;color:var(--slate-l);font-style:italic;margin-top:4px">' + esc(c.note.substring(0, 70)) + (c.note.length > 70 ? '...' : '') + '</div>' : ''}
        <div class="paz-tag" style="margin-top:6px">📅 ${new Date(c.created_at).toLocaleDateString('it')}</div>
        <div class="paz-actions">
          <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();editCartella('${c.id}')">✏️</button>
          <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();delCartella('${c.id}')">🗑️</button>
        </div>
      </div>`;
    }).join('') + '</div>';
}

async function apriCartella(id) {
  cartellaAperta = id;
  await renderCartellaDetail(id);
}

async function renderCartellaDetail(id) {
  const wrap = document.getElementById('main-content');
  wrap.innerHTML = '<div class="empty-state"><div class="ei">⏳</div><h3>Caricamento...</h3></div>';
  const [{ data: cart }, { data: piani }] = await Promise.all([
    sb.from('cartelle').select('*').eq('id', id).single(),
    sb.from('piani').select('*').eq('cartella_id', id).order('data_piano', { ascending: false })
  ]);
  if (!cart) { wrap.innerHTML = '<p>Errore</p>'; return; }
  document.getElementById('page-title').textContent = '📁 ' + cart.nome;
  const eta = cart.ddn ? calcolaEta(cart.ddn) : null;
  wrap.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="cartellaAperta=null;document.getElementById('page-title').textContent='📁 Cartelle Pazienti';loadCartelle()">← Tutte</button>
      <h3 style="font-size:16px;font-weight:700">📁 ${esc(cart.nome)}</h3>
      ${eta !== null ? `<span class="paz-tag">${eta} anni</span>` : ''}
      ${cart.sesso ? `<span class="paz-tag">${cart.sesso === 'M' ? '♂️' : '♀️'} ${cart.sesso}</span>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="editCartella('${cart.id}')">✏️ Modifica</button>
    </div>
    ${cart.note ? `<div style="background:#F8FAFC;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--slate-m);border-left:3px solid var(--teal)"><b>Note cliniche:</b> ${esc(cart.note)}</div>` : ''}
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="nuovoPianoInCartella('${cart.id}')">📋 Nuovo Piano</button>
    </div>
    <h4 style="font-size:13px;font-weight:700;color:var(--slate-m);margin-bottom:10px">📋 Piani salvati (${(piani || []).length})</h4>
    ${!(piani && piani.length) ? '<div class="empty-state" style="padding:24px"><div class="ei">📄</div><h3>Nessun piano ancora</h3><p>Clicca "Nuovo Piano" per creare il primo piano per questo paziente.</p></div>' :
    `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">` +
    piani.map(p => {
      let count = 0, giorni_count = 0;
      try { const parsed = JSON.parse(p.meals || '[]'); if (parsed[0]?.meals !== undefined) { giorni_count = parsed.length; parsed.forEach(g => count += (g.meals || []).reduce((s, m) => s + (m.items || []).filter(i => i.nome).length, 0)); } else { count = parsed.reduce((s, m) => s + (m.items || []).filter(i => i.nome).length, 0); giorni_count = 1; } } catch {}
      return `<div class="paz-card" onclick="caricaPiano('${p.id}')">
        <h4>${esc(p.nome)}</h4>
        <div class="paz-meta">📅 ${p.data_piano || '–'} · ${new Date(p.saved_at).toLocaleDateString('it')}</div>
        <div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap">
          ${giorni_count > 1 ? `<span class="paz-tag">${giorni_count} giorni</span>` : ''}
          <span class="paz-tag">${count} alimenti</span>
        </div>
        <div class="paz-actions"><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();delPiano('${p.id}')">🗑️</button></div>
      </div>`;
    }).join('') + '</div>'}`;
}

function nuovoPianoInCartella(cartellaId) {
  sessionStorage.setItem('loadPianoId', '');
  sessionStorage.setItem('newPianoCartella', cartellaId);
  window.location.href = 'app.html';
}

function caricaPiano(id) {
  sessionStorage.setItem('loadPianoId', id);
  window.location.href = 'app.html';
}

async function delPiano(id) {
  if (!confirm('Eliminare questo piano?')) return;
  showLoading(true);
  await sb.from('piani').delete().eq('id', id);
  showLoading(false);
  await renderCartellaDetail(cartellaAperta);
  toast('🗑️ Piano eliminato', 'info');
}

function openNewCartella() {
  editingCartellaId = null;
  document.getElementById('nc-title').textContent = '📁 Nuova Cartella Paziente';
  document.getElementById('nc-save-btn').textContent = '📁 Crea Cartella';
  ['nc-nome','nc-cognome','nc-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('nc-ddn').value = '';
  document.getElementById('nc-sesso').value = '';
  openM('modal-nc');
  setTimeout(() => document.getElementById('nc-nome').focus(), 200);
}

async function editCartella(id) {
  showLoading(true);
  const { data } = await sb.from('cartelle').select('*').eq('id', id).single();
  showLoading(false);
  if (!data) return;
  editingCartellaId = id;
  document.getElementById('nc-title').textContent = '✏️ Modifica Cartella';
  document.getElementById('nc-save-btn').textContent = '💾 Salva Modifiche';
  document.getElementById('nc-nome').value = data.nome || '';
  document.getElementById('nc-cognome').value = data.cognome || '';
  document.getElementById('nc-ddn').value = data.ddn || '';
  document.getElementById('nc-sesso').value = data.sesso || '';
  document.getElementById('nc-note').value = data.note || '';
  openM('modal-nc');
}

async function salvaCartella() {
  const nome = document.getElementById('nc-nome').value.trim();
  if (!nome) { toast('Inserisci il nome', 'err'); return; }
  const payload = {
    user_id: currentUser.id,
    nome: nome + (document.getElementById('nc-cognome').value.trim() ? ' ' + document.getElementById('nc-cognome').value.trim() : ''),
    cognome: document.getElementById('nc-cognome').value.trim(),
    ddn: document.getElementById('nc-ddn').value || null,
    sesso: document.getElementById('nc-sesso').value || null,
    note: document.getElementById('nc-note').value.trim() || null,
  };
  showLoading(true);
  let result;
  if (editingCartellaId) {
    result = await sb.from('cartelle').update(payload).eq('id', editingCartellaId);
  } else {
    payload.created_at = new Date().toISOString();
    result = await sb.from('cartelle').insert(payload);
  }
  showLoading(false);
  if (result.error) { toast('❌ ' + result.error.message, 'err'); return; }
  closeM('modal-nc');
  toast(editingCartellaId ? '✅ Cartella aggiornata!' : '📁 Cartella creata!', 'ok');
  editingCartellaId = null;
  if (cartellaAperta) await renderCartellaDetail(cartellaAperta);
  else loadCartelle();
}

async function delCartella(id) {
  if (!confirm('Eliminare questa cartella e tutti i piani al suo interno?')) return;
  showLoading(true);
  await sb.from('piani').delete().eq('cartella_id', id);
  await sb.from('cartelle').delete().eq('id', id);
  showLoading(false);
  cartellaAperta = null;
  document.getElementById('page-title').textContent = '📁 Cartelle Pazienti';
  loadCartelle();
  toast('🗑️ Cartella eliminata', 'info');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
